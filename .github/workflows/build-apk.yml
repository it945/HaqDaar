name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://xgbwqwisczlkltesycxk.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnYndxd2lzY3psa2x0ZXN5Y3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTE0MDIsImV4cCI6MjA5MzM4NzQwMn0.fUdDCPRi87eYWFRiYNxUgqOVSZWgCPrj_bV4HK_rMOQ"

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haqdaar-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
